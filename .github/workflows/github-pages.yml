name: Deploy to GitHub Pages

# Branch-based Pages deployment on purpose:
# - repo Pages mode must stay legacy / gh-pages / /
# - deploy uses PAGES_DEPLOY_TOKEN and pushes the packaged static site to gh-pages
# - this avoids GitHub-maintained Pages actions that previously emitted upstream Node runtime warnings

on:
  workflow_run:
    workflows: ["Bharat Highway Research Pipeline"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'
  REQUIRED_PAGES_BUILD_TYPE: 'legacy'
  REQUIRED_PAGES_BRANCH: 'gh-pages'
  REQUIRED_PAGES_PATH: '/'

jobs:
  build:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    outputs:
      bundle_sha256: ${{ steps.bundle_manifest.outputs.bundle_sha256 }}
      bundle_file_count: ${{ steps.bundle_manifest.outputs.bundle_file_count }}
    permissions:
      contents: read
    steps:
      - name: Restrict manual deploys to main
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Manual deploys must run from main. Got ${GITHUB_REF}." >&2
            exit 1
          fi

      - name: Checkout triggered revision
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout current revision
        if: github.event_name != 'workflow_run'
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate generated artifacts
        run: |
          python scripts/validate_artifacts.py --inventory research/source_inventory.yaml --catalog data/manifests/catalog.json --manifests data/manifests --fail-on-warning

      - name: Package static site
        run: |
          set -euo pipefail
          mkdir -p /tmp/gh-pages/data/manifests /tmp/gh-pages/data/processed
          mkdir -p /tmp/gh-pages/duckdb
          cp -r apps/web/* /tmp/gh-pages/
          mkdir -p /tmp/gh-pages/apps/web
          cp -r apps/web/* /tmp/gh-pages/apps/web/
          cp -r data/manifests/* /tmp/gh-pages/data/manifests/
          cp -r data/processed/* /tmp/gh-pages/data/processed/
          mkdir -p /tmp/gh-pages/apps/web/data/manifests /tmp/gh-pages/apps/web/data/processed /tmp/gh-pages/apps/web/duckdb
          cp -r data/manifests/* /tmp/gh-pages/apps/web/data/manifests/
          cp -r data/processed/* /tmp/gh-pages/apps/web/data/processed/
          curl -fsSL -o /tmp/gh-pages/duckdb/duckdb-eh.wasm https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.29.0/dist/duckdb-eh.wasm
          curl -fsSL -o /tmp/gh-pages/duckdb/duckdb-mvp.wasm https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.29.0/dist/duckdb-mvp.wasm
          curl -fsSL -o /tmp/gh-pages/duckdb/duckdb-browser.mjs https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.29.0/dist/duckdb-browser.mjs
          curl -fsSL -o /tmp/gh-pages/duckdb/duckdb-browser-eh.worker.js https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.29.0/dist/duckdb-browser-eh.worker.js
          curl -fsSL -o /tmp/gh-pages/duckdb/duckdb-browser-mvp.worker.js https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.29.0/dist/duckdb-browser-mvp.worker.js
          curl -fsSL -o /tmp/gh-pages/duckdb/duckdb-browser-coi.pthread.worker.js https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.29.0/dist/duckdb-browser-coi.pthread.worker.js
          cp -r /tmp/gh-pages/duckdb/* /tmp/gh-pages/apps/web/duckdb/
          touch /tmp/gh-pages/.nojekyll
          touch /tmp/gh-pages/apps/web/.nojekyll

      - name: Generate reproducible bundle manifest
        id: bundle_manifest
        run: |
          set -euo pipefail

          python - <<'PY'
          import hashlib
          import json
          import pathlib
          from datetime import datetime, timezone

          root = pathlib.Path('/tmp/gh-pages')
          files = []
          digest = hashlib.sha256()
          for path in sorted(root.rglob('*')):
              if path.is_dir():
                  continue
              rel = path.relative_to(root).as_posix()
              if rel.startswith('.git/'):
                  continue
              data = path.read_bytes()
              h = hashlib.sha256(data).hexdigest()
              digest.update(h.encode('utf-8'))
              files.append({'path': rel, 'sha256': h, 'bytes': len(data)})

          manifest = {
              'generated_at': datetime.now(timezone.utc).isoformat(),
              'workflow': 'github-pages.yml',
              'git_sha': '${{ github.sha }}',
              'file_count': len(files),
              'bundle_sha256': digest.hexdigest(),
              'files': files,
          }

          manifest_path = root / 'bundle-manifest.json'
          manifest_path.write_text(json.dumps(manifest, indent=2), encoding='utf-8')
          PY
          bundle_sha256="$(jq -r '.bundle_sha256' /tmp/gh-pages/bundle-manifest.json)"
          bundle_file_count="$(jq -r '.file_count' /tmp/gh-pages/bundle-manifest.json)"
          echo "bundle_sha256=${bundle_sha256}" >> "$GITHUB_OUTPUT"
          echo "bundle_file_count=${bundle_file_count}" >> "$GITHUB_OUTPUT"

      - name: Upload packaged site artifact
        uses: actions/upload-artifact@v7
        with:
          name: gh-pages-site
          if-no-files-found: error
          path: /tmp/gh-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.page_meta.outputs.page_url }}
      bundle_sha256: ${{ steps.bundle_meta.outputs.bundle_sha256 }}
      bundle_file_count: ${{ steps.bundle_meta.outputs.bundle_file_count }}
    permissions:
      contents: read
    environment:
      name: production
    steps:
      - name: Download packaged site artifact
        uses: actions/download-artifact@v8
        with:
          name: gh-pages-site
          path: /tmp/gh-pages

      - name: Verify deploy secret is configured
        env:
          PAGES_DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        run: |
          if [ -z "${PAGES_DEPLOY_TOKEN}" ]; then
            echo "Missing PAGES_DEPLOY_TOKEN secret." >&2
            exit 1
          fi

      - name: Verify Pages publish mode
        env:
          GH_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        run: |
          BUILD_TYPE="$(gh api repos/${GITHUB_REPOSITORY}/pages --jq .build_type)"
          BRANCH="$(gh api repos/${GITHUB_REPOSITORY}/pages --jq .source.branch)"
          PATH_VALUE="$(gh api repos/${GITHUB_REPOSITORY}/pages --jq .source.path)"
          if [ "${BUILD_TYPE}" != "${REQUIRED_PAGES_BUILD_TYPE}" ] || [ "${BRANCH}" != "${REQUIRED_PAGES_BRANCH}" ] || [ "${PATH_VALUE}" != "${REQUIRED_PAGES_PATH}" ]; then
            echo "Pages must publish from ${REQUIRED_PAGES_BUILD_TYPE}:${REQUIRED_PAGES_BRANCH}${REQUIRED_PAGES_PATH}. Got ${BUILD_TYPE}:${BRANCH}${PATH_VALUE}." >&2
            exit 1
          fi

      - name: Read bundle manifest
        id: bundle_meta
        run: |
          set -euo pipefail
          manifest_path=/tmp/gh-pages/bundle-manifest.json
          if [ ! -f "${manifest_path}" ]; then
            echo "bundle_sha256=missing" >> "$GITHUB_OUTPUT"
            echo "bundle_file_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          bundle_sha256="$(jq -r '.bundle_sha256 // "missing"' "${manifest_path}")"
          bundle_file_count="$(jq -r '.file_count // 0' "${manifest_path}")"
          echo "bundle_sha256=${bundle_sha256}" >> "$GITHUB_OUTPUT"
          echo "bundle_file_count=${bundle_file_count}" >> "$GITHUB_OUTPUT"

      - name: Publish built site to gh-pages branch
        env:
          PAGES_DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          cd /tmp/gh-pages
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${PAGES_DEPLOY_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin HEAD:gh-pages

      - name: Read Pages URL
        id: page_meta
        env:
          GH_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        run: |
          echo "page_url=$(gh api repos/${GITHUB_REPOSITORY}/pages --jq .html_url)" >> "$GITHUB_OUTPUT"

  cd_smoke:
    name: Playwright CD smoke check
    needs:
      - deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEPLOY_PAGE_URL: ${{ needs.deploy.outputs.page_url }}
      DEPLOY_BUNDLE_SHA256: ${{ needs.deploy.outputs.bundle_sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright browser runtime
        run: |
          python -m playwright install chromium

      - name: Log deployment provenance
        run: |
          echo "Deploy URL: ${DEPLOY_PAGE_URL}"
          echo "Bundle SHA: ${DEPLOY_BUNDLE_SHA256}"

      - name: Verify deployed dashboard charts
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          if [ -z "${PAGE_URL}" ]; then
            echo "Missing PAGE_URL from deploy step" >&2
            exit 1
          fi
          # GitHub Pages can briefly serve the prior site revision after a successful branch push.
          # Retry the full smoke check with backoff rather than weakening chart assertions.
          target_url="${PAGE_URL%/}/apps/web/"
          for attempt in 1 2 3; do
            if python scripts/playwright_smoke.py --url "${target_url}"; then
              exit 0
            fi
            if [ "${attempt}" -eq 3 ]; then
              echo "Playwright CD smoke failed after ${attempt} attempts for ${target_url}" >&2
              exit 1
            fi
            sleep_seconds=$((attempt * 20))
            echo "Playwright CD smoke retry ${attempt}/3 failed for ${target_url}; waiting ${sleep_seconds}s before retry..."
            sleep "${sleep_seconds}"
          done
