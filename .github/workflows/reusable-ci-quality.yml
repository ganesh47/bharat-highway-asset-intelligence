name: Reusable CI Quality

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: '3.11'
      fail_on_warnings:
        required: false
        type: boolean
        default: true

jobs:
  workflow_manifest_lint:
    name: Workflow YAML syntax checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install YAML parser
        run: |
          python -m pip install --quiet pyyaml

      - name: Validate workflow YAML files
        run: |
          python - <<'PY'
          import pathlib
          import sys
          import yaml

          failed = False
          for path in pathlib.Path('.github/workflows').glob('*.yml'):
              try:
                  yaml.safe_load(path.read_text(encoding='utf-8'))
              except Exception as exc:
                  failed = True
                  print(f"Workflow parse failure in {path}: {exc}", file=sys.stderr)

          if failed:
              sys.exit(1)
          print("All workflow YAML files parsed successfully.")
          PY

  python_sanity:
    name: Python package sanity checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - workflow_manifest_lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Python compile checks
        run: |
          python -m compileall -q .

  artifact_validation:
    name: Artifact validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - python_sanity
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate generated artifacts
        run: |
          python scripts/validate_artifacts.py --inventory research/source_inventory.yaml --catalog data/manifests/catalog.json --manifests data/manifests

  quality_gate:
    name: Quality gate status
    runs-on: ubuntu-latest
    needs:
      - workflow_manifest_lint
      - python_sanity
      - artifact_validation
    steps:
      - name: Evaluate quality gate status
        run: |
          echo "Quality gate passed for required jobs."
