name: Bharat Highway Research Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: research-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  inventory_reports:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run source scan
        run: |
          python -m research.scan --inventory research/source_inventory.yaml --out research/source_inventory.json

      - name: Run gap report
        run: |
          python -m research.gap_report --inventory research/source_inventory.yaml --out research/gaps.md

      - name: Upload inventory reports
        uses: actions/upload-artifact@v4
        with:
          name: bhai-inventory-reports
          path: |
            research/source_inventory.json
            research/gaps.md

  build_data:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install OCR system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends poppler-utils tesseract-ocr tesseract-ocr-eng

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Ingest all registered sources
        run: |
          python -m pipelines.ingest --inventory research/source_inventory.yaml

      - name: Extract NHAI annual report OCR artifacts
        run: |
          python scripts/nhai_annual_report_extractor.py --max-workers 1

      - name: Refresh NHAI confidence from extraction quality
        run: |
          python -m pipelines.ingest --inventory research/source_inventory.yaml --source nhai_annual_report_documents --source nhai_audited_results_pdf

      - name: Build correlation artifacts
        run: |
          python -m pipelines.correlation

      - name: Upload data workspace
        uses: actions/upload-artifact@v4
        with:
          name: bhai-data-workspace
          path: |
            data/manifests/
            data/processed/
            data/raw/manual/

  finalize_research:
    needs:
      - inventory_reports
      - build_data
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Download inventory reports
        uses: actions/download-artifact@v4
        with:
          name: bhai-inventory-reports
          path: .

      - name: Download data workspace
        uses: actions/download-artifact@v4
        with:
          name: bhai-data-workspace
          path: .

      - name: Validate generated artifacts
        run: |
          python scripts/validate_artifacts.py --inventory research/source_inventory.yaml --catalog data/manifests/catalog.json --manifests data/manifests

      - name: Upload research artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bhai-research-artifacts
          path: |
            research/source_inventory.json
            research/gaps.md
            data/manifests/
            data/processed/

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: bhai-source-log
          path: |
            data/raw/manual/
            data/manifests/catalog.json
